name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS app
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Run lint
        run: .venv/bin/ruff check src tests

      - name: Run tests
        run: .venv/bin/pytest

      - name: Build app
        run: ./scripts/build_macos_app.sh

      - name: Zip app
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent dist/Pnumi.app "Pnumi-${GITHUB_REF_NAME}-macos.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: pnumi-macos
          path: Pnumi-${{ github.ref_name }}-macos.zip
          if-no-files-found: error

  windows:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .\.venv\Scripts\pip install --upgrade pip
          .\.venv\Scripts\pip install -e ".[dev]"

      - name: Run lint
        run: .\.venv\Scripts\ruff check src tests

      - name: Run tests
        run: .\.venv\Scripts\pytest

      - name: Build app
        run: .\scripts\build_windows_app.ps1

      - name: Zip app
        run: Compress-Archive -Path dist\Pnumi -DestinationPath "Pnumi-${env:GITHUB_REF_NAME}-windows.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: pnumi-windows
          path: Pnumi-${{ github.ref_name }}-windows.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check tag matches project version
        run: |
          set -euo pipefail
          project_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$project_version" != "$tag_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $project_version" >&2
            exit 1
          fi

      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Extract changelog entry
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(
              rf"^## {re.escape(version)}[^\n]*\n(?P<body>.*?)(?=^## |\Z)",
              changelog,
              re.MULTILINE | re.DOTALL,
          )
          if not match:
              raise SystemExit(f"No CHANGELOG.md entry found for {version}")
          Path("release-notes.md").write_text(match.group("body").strip() + "\n", encoding="utf-8")
          PY

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "release-assets/Pnumi-${GITHUB_REF_NAME}-macos.zip#Pnumi macOS app" \
            "release-assets/Pnumi-${GITHUB_REF_NAME}-windows.zip#Pnumi Windows app" \
            --title "Pnumi $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
