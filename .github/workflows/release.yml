name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS app
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check tag matches project version
        run: |
          set -euo pipefail
          project_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$project_version" != "$tag_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $project_version" >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Run tests
        run: .venv/bin/pytest

      - name: Build app
        run: ./scripts/build_macos_app.sh

      - name: Zip app
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent dist/Pnumi.app "Pnumi-${GITHUB_REF_NAME}-macos.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "Pnumi-${GITHUB_REF_NAME}-macos.zip#Pnumi macOS app" \
            --title "Pnumi $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
